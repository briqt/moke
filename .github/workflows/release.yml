name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # mosh native 产物（GPLv3 二进制不入库）——发布包必须自行构建，否则 APK 缺 libmosh-client.so，
      # 选 mosh 协议会因缺 native 库而不可用。见 scripts/build-mosh-native.sh。
      - name: Install NDK r29
        run: sdkmanager --install "ndk;29.0.14206865"

      - name: Build mosh native (arm64-v8a)
        run: |
          NDK_DIR="$ANDROID_HOME/ndk/29.0.14206865"
          [ -d "$NDK_DIR" ] || NDK_DIR="$(ls -d "$ANDROID_HOME"/ndk/29.* 2>/dev/null | sort -V | tail -1)"
          [ -d "$NDK_DIR" ] || NDK_DIR="$(ls -d "$ANDROID_HOME"/ndk/* 2>/dev/null | sort -V | tail -1)"
          echo "Using NDK: $NDK_DIR"
          export ANDROID_NDK="$NDK_DIR"
          bash scripts/build-mosh-native.sh arm64-v8a
          ls -lh app/src/main/jniLibs/arm64-v8a/

      # maple 发行变体内置字体（OFL，不入库）——构建 maple 变体前下载提取。
      - name: Fetch Maple font (maple flavor)
        run: bash scripts/fetch-maple-font.sh

      - name: Decode signing keystore
        env:
          KS_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/moke-release.jks"

      - name: Assemble release APK
        env:
          MOKE_KEYSTORE: ${{ runner.temp }}/moke-release.jks
          MOKE_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          MOKE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          MOKE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # 守卫：确保 mosh native 库已打进 APK，避免再次发出「选 mosh 即崩」的包。
      - name: Verify native libs packaged
        run: |
          for APK in app/build/outputs/apk/standard/release/app-standard-release.apk \
                     app/build/outputs/apk/maple/release/app-maple-release.apk; do
            unzip -l "$APK" | grep -q "lib/arm64-v8a/libmosh-client.so" || { echo "❌ $APK 缺 libmosh-client.so"; exit 1; }
            unzip -l "$APK" | grep -q "lib/arm64-v8a/libtermux.so" || { echo "❌ $APK 缺 libtermux.so"; exit 1; }
          done
          # release 构建会压缩资源路径（res/font/maple_mono.ttf → res/xx.ttf），故按体积判定：
          # maple 内置字体约 20MB，是唯一 >15MB 的 ttf；standard 包无此项。
          unzip -l app/build/outputs/apk/maple/release/app-maple-release.apk \
            | awk '/\.ttf$/ && $1+0 > 15000000 {f=1} END{exit !f}' \
            || { echo "❌ maple 包缺内置字体（未见 >15MB 的 ttf）"; exit 1; }
          echo "✅ 两个变体 native 库已打包；maple 内置字体已打包"

      - name: Stage APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/standard/release/app-standard-release.apk "dist/moke-${{ github.ref_name }}.apk"
          cp app/build/outputs/apk/maple/release/app-maple-release.apk "dist/moke-${{ github.ref_name }}-maple.apk"
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: moke ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/moke-*.apk
          body: |
            **moke · 墨客 ${{ github.ref_name }}** — Android 原生 SSH / mosh 终端。

            ### 安装（两个包择一）
            - `moke-${{ github.ref_name }}.apk` — 常规包，中文回退用内置思源黑体子集，体积小。
            - `moke-${{ github.ref_name }}-maple.apk` — 自带 Maple Mono 并设为默认中文回退（开箱中英等宽），包更大。

            允许"安装未知来源应用"后安装（稳定签名，可覆盖升级）。

            ### 特性
            - 多会话，原生终端渲染（Apache-2.0 terminal-view 内核）
            - SSH（密码 / 私钥）+ mosh（UDP 漫游）
            - 实时预览外观 · 多套配色 · 字体管理（主字体 + 中文回退）
            - 连接分组排序 · 双排附加键 · 文本段输入

            本版改动见 [CHANGELOG](https://github.com/briqt/moke/blob/main/CHANGELOG.md)。
